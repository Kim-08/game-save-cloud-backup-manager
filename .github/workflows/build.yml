name: Build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore src/GameSaveCloudBackup/GameSaveCloudBackup.csproj

      - name: Build
        run: dotnet build src/GameSaveCloudBackup/GameSaveCloudBackup.csproj --configuration Release --no-restore
